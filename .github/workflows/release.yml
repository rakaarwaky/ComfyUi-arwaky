name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.2.0)'
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-unknown-linux-gnu

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            build-essential \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            rpm

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Tauri CLI
        run: npm install --global @tauri-apps/cli@latest

      - name: Build Tauri app
        run: |
          cd src-tauri
          tauri build --target ${{ matrix.target }}

      - name: List build artifacts
        run: |
          find src-tauri/target/${{ matrix.target }}/release/bundle -type f \
            \( -name "*.AppImage" -o -name "*.rpm" -o -name "*.deb" \) \
            -exec ls -lh {} \;

      - name: Upload AppImage
        uses: actions/upload-artifact@v4
        with:
          name: appimage-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage

      - name: Upload RPM
        uses: actions/upload-artifact@v4
        with:
          name: rpm-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/rpm/*.rpm

      - name: Upload DEB
        uses: actions/upload-artifact@v4
        with:
          name: deb-${{ matrix.target }}
          path: src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb

  release:
    name: Create GitHub Release
    needs: build-linux
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \
            \( -name "*.AppImage" -o -name "*.rpm" -o -name "*.deb" \) \
            -exec cp {} release-assets/ \;
          cd release-assets
          sha256sum * > SHA256SUMS.txt
          ls -lh

      - name: Generate release notes
        id: release_notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          cat > release-notes.md << EOF
          ## ComfyUI Desktop \${TAG}

          ### Downloads

          | Format | File |
          |--------|------|
          | AppImage (Portable) | \`*.AppImage\` |
          | RPM (Fedora/RHEL) | \`*.rpm\` |
          | DEB (Debian/Ubuntu) | \`*.deb\` |

          ### Quick Start

          **AppImage:**
          \`\`\`bash
          chmod +x ComfyUI-Desktop-*.AppImage
          ./ComfyUI-Desktop-*.AppImage
          \`\`\`

          **RPM:**
          \`\`\`bash
          sudo rpm -i comfyui-desktop-*.rpm
          comfyui-desktop
          \`\`\`

          ### Requirements
          - AMD GPU (RX 6000/7000 series)
          - ROCm 7.2.4+ installed system-wide
          - 20GB+ free disk space (for backend download on first run)
          - Linux (Fedora 40+, Ubuntu 24.04+, or compatible)

          ### Verification
          \`\`\`bash
          sha256sum -c SHA256SUMS.txt
          \`\`\`
          EOF

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ComfyUI Desktop ${{ github.ref_name }}
          body_path: release-notes.md
          files: release-assets/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
