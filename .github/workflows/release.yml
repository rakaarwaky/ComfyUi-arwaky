name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g., v0.2.0)'
        required: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build-linux:
    name: Build Linux
    runs-on: ubuntu-24.04
    container:
      image: fedora:44
      options: --user root

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          dnf install -y \
            webkit2gtk4.1-devel gtk3-devel librsvg2-devel patchelf \
            openssl-devel libappindicator-gtk3-devel rpm-build \
            git gcc gcc-c++ make pkgconf-pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache cargo
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            crates/launcher/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install Tauri CLI
        run: npm install --global @tauri-apps/cli@latest

      - name: Build Tauri app
        run: |
          cd crates/launcher
          tauri build

      - name: List build artifacts
        run: |
          find crates/launcher/target/release/bundle -type f \
            \( -name "*.AppImage" -o -name "*.rpm" \) \
            -exec ls -lh {} \;

      - name: Upload AppImage
        uses: actions/upload-artifact@v7
        with:
          name: appimage
          path: crates/launcher/target/release/bundle/appimage/*.AppImage

      - name: Upload RPM
        uses: actions/upload-artifact@v7
        with:
          name: rpm
          path: crates/launcher/target/release/bundle/rpm/*.rpm

  release:
    name: Create GitHub Release
    needs: build-linux
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find artifacts -type f \
            \( -name "*.AppImage" -o -name "*.rpm" \) \
            -exec cp {} release-assets/ \;
          cd release-assets
          sha256sum * > SHA256SUMS.txt
          ls -lh

      - name: Generate changelog
        id: changelog
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          PREV_TAG=$(git tag --sort=-version:refname | grep '^v' | sed -n '2p' || true)
          if [ -n "$PREV_TAG" ]; then
            {
              echo "### Changelog"
              echo ""
              git log --oneline --no-decorate "${PREV_TAG}..${TAG}" 2>/dev/null | \
                sed 's/^/- /' || echo "(no changes since previous tag)"
            } > changelog.md
          else
            echo "(initial release)" > changelog.md
          fi
          cat changelog.md

      - name: Generate release notes
        id: release_notes
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          {
            echo "## ComfyUI Desktop ${TAG}"
            echo ""
            echo "### Downloads"
            echo ""
            echo "| Format | File |"
            echo "|--------|------|"
            echo "| AppImage (Portable) | \`*.AppImage\` |"
            echo "| RPM (Fedora/RHEL) | \`*.rpm\` |"
            echo ""
            echo "### Quick Start"
            echo ""
            echo "**AppImage:**"
            printf '```bash\nchmod +x ComfyUI-Desktop-*.AppImage\n./ComfyUI-Desktop-*.AppImage\n```\n'
            echo ""
            echo "**RPM:**"
            printf '```bash\nsudo rpm -i comfyui-desktop-*.rpm\ncomfyui-desktop\n```\n'
            echo ""
            echo "### Requirements"
            echo "- AMD GPU (RX 6000/7000 series, Radeon PRO W6000/7000)"
            echo "- ROCm 7.2.4+ installed system-wide"
            echo "- 20GB+ free disk space (for backend download on first run)"
            echo "- Fedora Linux 40+"
            echo ""
            cat changelog.md
            echo ""
            echo "### Verification"
            printf '```bash\nsha256sum -c SHA256SUMS.txt\n```\n'
          } > release-notes.md
          cat release-notes.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.ref_name }}
          name: ComfyUI Desktop ${{ github.ref_name }}
          body_path: release-notes.md
          files: release-assets/*
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
