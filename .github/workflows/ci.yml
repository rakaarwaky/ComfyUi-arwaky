name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  rust-checks:
    name: Rust Checks
    runs-on: ubuntu-24.04
    container:
      image: fedora:44
      options: --user root
    defaults:
      run:
        working-directory: crates/launcher

    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Install system dependencies
        run: |
          dnf install -y \
            webkit2gtk4.1-devel gtk3-devel libappindicator-gtk3-devel \
            librsvg2-devel patchelf openssl-devel \
            git gcc gcc-c++ make pkgconf-pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo check
        run: cargo check --all-targets --all-features

      - name: cargo clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: cargo test
        run: cargo test --all-features --no-fail-fast
        continue-on-error: true

  shell-checks:
    name: Shell Script Lint
    runs-on: ubuntu-24.04
    container:
      image: fedora:44
      options: --user root
    steps:
      - uses: actions/checkout@v6

      - name: Install shellcheck
        run: dnf install -y shellcheck

      - name: Run shellcheck
        run: |
          find scripts/ -name "*.sh" -type f -print0 | xargs -0 shellcheck --severity=warning

  config-validation:
    name: Validate Config Files
    runs-on: ubuntu-24.04
    container:
      image: fedora:44
      options: --user root
    steps:
      - uses: actions/checkout@v6

      - name: Install jq
        run: dnf install -y jq

      - name: Validate tauri.conf.json
        run: jq empty crates/launcher/tauri.conf.json && echo "Valid"

      - name: Validate Cargo.toml
        run: |
          cd crates/launcher
          cargo metadata --format-version=1 > /dev/null && echo "Valid"

      - name: Check required files
        run: |
          for file in README.md LICENSE CONTRIBUTING.md \
            crates/launcher/Cargo.toml crates/launcher/tauri.conf.json \
            crates/launcher/src/main.rs crates/launcher/src/lib.rs crates/launcher/src/downloader.rs; do
            [ -f "$file" ] && echo "OK $file" || { echo "MISSING $file"; exit 1; }
          done

  security-audit:
    name: Security Audit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo-audit
        run: cargo audit
        working-directory: crates/launcher
