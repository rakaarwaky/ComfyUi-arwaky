name: Nightly Backend Build

on:
  schedule:
    - cron: '0 2 * * 1'
  workflow_dispatch:

jobs:
  check-comfyui-updates:
    name: Check for ComfyUI Updates
    runs-on: ubuntu-24.04
    outputs:
      has_updates: ${{ steps.check.outputs.has_updates }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Check for new ComfyUI commits
        id: check
        run: |
          cd ComfyUI
          CURRENT=$(git rev-parse HEAD)
          git fetch origin main
          LATEST=$(git rev-parse origin/main)
          echo "Current: $CURRENT"
          echo "Latest:  $LATEST"
          if [ "$CURRENT" != "$LATEST" ]; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
          else
            echo "has_updates=false" >> $GITHUB_OUTPUT
          fi

  trigger-build:
    name: Trigger Backend Build
    needs: check-comfyui-updates
    if: needs.check-comfyui-updates.outputs.has_updates == 'true'
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build-backend.yml',
              ref: 'main',
              inputs: {
                backend_version: 'nightly-${{ github.run_id }}',
                python_version: '3.12',
                create_release: 'false'
              }
            });
