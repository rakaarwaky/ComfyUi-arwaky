name: CI Multi-Distro

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ==========================================================================
  # Stage 1: Lint & Test (distro-independent)
  # ==========================================================================
  lint-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-24.04
    container:
      image: fedora:44
      options: --user root
    steps:
      - uses: actions/checkout@v6

      - name: Install system deps (for Tauri)
        run: |
          dnf install -y \
            webkit2gtk4.1-devel gtk3-devel libappindicator-gtk3-devel \
            librsvg2-devel patchelf openssl-devel jq shellcheck

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/
            ~/.cargo/git/
            crates/launcher/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: cargo fmt
        run: cargo fmt --manifest-path crates/launcher/Cargo.toml --all -- --check

      - name: cargo check
        run: cargo check --manifest-path crates/launcher/Cargo.toml --all-targets

      - name: cargo clippy
        run: cargo clippy --manifest-path crates/launcher/Cargo.toml --all-targets -- -D warnings

      - name: cargo test
        run: cargo test --manifest-path crates/launcher/Cargo.toml --all-features

      - name: shellcheck scripts
        run: |
          find scripts/ -name "*.sh" -type f -print0 | \
            xargs -0 shellcheck --severity=warning

      - name: Validate tauri.conf.json
        run: jq empty crates/launcher/tauri.conf.json

  # ==========================================================================
  # Stage 2: Build on Fedora distros
  # ==========================================================================
  build-matrix:
    name: Build on ${{ matrix.distro }}
    needs: lint-test
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: fedora-40
            image: fedora:40
          - distro: fedora-41
            image: fedora:41

    container:
      image: ${{ matrix.image }}
      options: --user root

    steps:
      - name: Install system deps
        run: |
          dnf install -y \
            webkit2gtk4.1-devel gtk3-devel libappindicator-gtk3-devel \
            librsvg2-devel patchelf openssl-devel \
            git curl wget tar gzip which findutils \
            gcc gcc-c++ make pkgconf-pkg-config \
            rpm-build jq

      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "${{ github.workspace }}/.cargo/bin" >> $GITHUB_PATH
        env:
          CARGO_HOME: ${{ github.workspace }}/.cargo
          RUSTUP_HOME: ${{ github.workspace }}/.rustup

      - name: Verify Rust
        run: |
          rustc --version
          cargo --version

      - name: Install Node.js 20
        run: |
          dnf install -y nodejs || \
            (curl -fsSL https://rpm.nodesource.com/setup_20.x | bash - && dnf install -y nodejs)
          node --version
          npm --version

      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            .cargo/bin/
            .cargo/registry/
            .cargo/git/
            crates/launcher/target/
          key: ${{ matrix.distro }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.distro }}-cargo-

      - name: Install Tauri CLI
        run: npm install --global @tauri-apps/cli@latest

      - name: Build Tauri app
        run: |
          export PATH="$HOME/.cargo/bin:$PATH"
          cd crates/launcher
          tauri build
        env:
          CARGO_HOME: ${{ github.workspace }}/.cargo
          RUSTUP_HOME: ${{ github.workspace }}/.rustup

      - name: List build artifacts
        run: |
          echo "=== Bundle outputs ==="
          find crates/launcher/target/release/bundle -type f \
            \( -name "*.AppImage" -o -name "*.rpm" \) \
            -exec ls -lh {} \; 2>/dev/null || echo "No bundles found"
          echo ""
          echo "=== Binary ==="
          ls -lh crates/launcher/target/release/app 2>/dev/null || echo "Binary not found"

      - name: Upload AppImage (${{ matrix.distro }})
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: appimage-${{ matrix.distro }}
          path: crates/launcher/target/release/bundle/appimage/*.AppImage
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload RPM (${{ matrix.distro }})
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: rpm-${{ matrix.distro }}
          path: crates/launcher/target/release/bundle/rpm/*.rpm
          if-no-files-found: ignore
          retention-days: 14

  # ==========================================================================
  # Stage 3: Smoke test install on Fedora
  # ==========================================================================
  smoke-test:
    name: Smoke test on ${{ matrix.distro }}
    needs: build-matrix
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - distro: fedora-40
            image: fedora:40
            artifact: rpm-fedora-40

    container:
      image: ${{ matrix.image }}
      options: --user root

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact }}
          path: ./pkg

      - name: Install package
        run: dnf install -y ./pkg/*.rpm

      - name: Verify desktop entry
        run: |
          if [ -f /usr/share/applications/comfyui-desktop.desktop ]; then
            echo "Desktop entry found"
            cat /usr/share/applications/comfyui-desktop.desktop
          else
            echo "Desktop entry not found (not bundled)"
          fi

  # ==========================================================================
  # Final: Summary
  # ==========================================================================
  ci-summary:
    name: CI Summary
    needs: [lint-test, build-matrix, smoke-test]
    runs-on: ubuntu-24.04
    if: always()
    steps:
      - name: Check all jobs
        run: |
          echo "Lint & Test:    ${{ needs.lint-test.result }}"
          echo "Build Matrix:   ${{ needs.build-matrix.result }}"
          echo "Smoke Test:     ${{ needs.smoke-test.result }}"
          if [[ "${{ needs.lint-test.result }}" != "success" ]]; then
            echo "Lint/Test failed"
            exit 1
          fi
          echo "CI passed"
