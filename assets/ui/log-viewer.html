<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Backend Logs — ComfyUI Desktop</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0d1117;
      color: #c9d1d9;
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
      font-size: 12px;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      background: #161b22;
      border-bottom: 1px solid #30363d;
      flex-shrink: 0;
    }
    .toolbar .title {
      font-weight: bold;
      color: #7c3aed;
      font-size: 14px;
    }
    .toolbar input {
      flex: 1;
      max-width: 300px;
      background: #0d1117;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 4px 8px;
      border-radius: 4px;
      font-size: 12px;
      font-family: inherit;
    }
    .toolbar input:focus {
      outline: none;
      border-color: #7c3aed;
    }
    .toolbar button {
      background: #21262d;
      border: 1px solid #30363d;
      color: #c9d1d9;
      padding: 4px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      font-family: inherit;
    }
    .toolbar button:hover { background: #30363d; }
    .toolbar button.active { background: #7c3aed; color: white; border-color: #7c3aed; }
    .toolbar .count { color: #8b949e; font-size: 11px; white-space: nowrap; }
    .toolbar .gpu {
      display: flex;
      gap: 8px;
      margin-left: auto;
      font-size: 11px;
      color: #8b949e;
    }
    .toolbar .gpu .metric { white-space: nowrap; }
    .toolbar .gpu .metric.warn { color: #f0883e; }
    .toolbar .gpu .metric.danger { color: #f85149; }
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
      line-height: 1.6;
    }
    .log-line {
      white-space: pre-wrap;
      word-break: break-all;
    }
    .log-line.stdout { color: #8b949e; }
    .log-line.stderr { color: #f85149; }
    .log-line.launcher { color: #a371f7; }
    .log-line.highlight { background: rgba(124, 58, 237, 0.15); border-radius: 2px; }
    .log-line.filtered-out { display: none; }
    .status-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 4px 12px;
      background: #161b22;
      border-top: 1px solid #30363d;
      font-size: 11px;
      color: #8b949e;
      flex-shrink: 0;
    }
    .status-bar .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #f85149;
    }
    .status-bar .dot.alive { background: #3fb950; }
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: #0d1117; }
    ::-webkit-scrollbar-thumb { background: #30363d; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #484f58; }
  </style>
</head>
<body>
  <div class="toolbar">
    <span class="title">Backend Logs</span>
    <input id="filter" type="text" placeholder="Filter..." />
    <span class="count" id="count">0 lines</span>
    <button id="btn-auto" class="active">Auto-scroll</button>
    <button id="btn-pause">Pause</button>
    <button id="btn-clear">Clear</button>
    <div class="gpu" id="gpu-info">
      <span class="metric" id="gpu-vram">VRAM: --</span>
      <span class="metric" id="gpu-util">GPU: --%</span>
      <span class="metric" id="gpu-temp">Temp: --</span>
    </div>
  </div>
  <div class="content" id="content"></div>
  <div class="status-bar">
    <div class="dot" id="status-dot"></div>
    <span id="status-text">Connecting...</span>
    <span style="margin-left:auto" id="uptime"></span>
  </div>

  <script>
    const POLL_MS = 1000;
    const MAX_LINES = 3000;
    let lastId = -1;
    let autoScroll = true;
    let paused = false;
    let filterText = "";
    const content = document.getElementById("content");
    const filterInput = document.getElementById("filter");
    const countEl = document.getElementById("count");
    const btnAuto = document.getElementById("btn-auto");
    const btnPause = document.getElementById("btn-pause");
    const btnClear = document.getElementById("btn-clear");
    const statusDot = document.getElementById("status-dot");
    const statusText = document.getElementById("status-text");
    const uptimeEl = document.getElementById("uptime");
    const gpuVram = document.getElementById("gpu-vram");
    const gpuUtil = document.getElementById("gpu-util");
    const gpuTemp = document.getElementById("gpu-temp");

    btnAuto.addEventListener("click", () => {
      autoScroll = !autoScroll;
      btnAuto.classList.toggle("active", autoScroll);
    });
    btnPause.addEventListener("click", () => {
      paused = !paused;
      btnPause.classList.toggle("active", paused);
      btnPause.textContent = paused ? "Resume" : "Pause";
    });
    btnClear.addEventListener("click", () => {
      content.innerHTML = "";
      lastId = -1;
      updateCount();
    });
    filterInput.addEventListener("input", (e) => {
      filterText = e.target.value.toLowerCase();
      applyFilter();
    });
    content.addEventListener("scroll", () => {
      const atBottom = content.scrollHeight - content.scrollTop - content.clientHeight < 30;
      if (!atBottom && autoScroll) {
        autoScroll = false;
        btnAuto.classList.remove("active");
      }
    });

    function applyFilter() {
      const lines = content.querySelectorAll(".log-line");
      for (const line of lines) {
        if (!filterText) {
          line.classList.remove("filtered-out");
        } else {
          line.classList.toggle("filtered-out", !line.textContent.toLowerCase().includes(filterText));
        }
      }
      updateCount();
    }

    function updateCount() {
      const visible = content.querySelectorAll(".log-line:not(.filtered-out)").length;
      const total = content.querySelectorAll(".log-line").length;
      countEl.textContent = filterText ? `${visible}/${total}` : `${total} lines`;
    }

    function appendLines(lines) {
      for (const { id, text } of lines) {
        if (id <= lastId) continue;
        lastId = id;

        const div = document.createElement("div");
        div.className = "log-line";

        if (text.includes("\"source\":\"stderr\"")) {
          div.classList.add("stderr");
        } else if (text.includes("\"source\":\"launcher\"")) {
          div.classList.add("launcher");
        } else {
          div.classList.add("stdout");
        }

        if (text.includes("ROCm") || text.includes("HIP") || text.includes("Torch") ||
            text.includes("comgr") || text.includes("amdgpu") || text.includes("ERROR") ||
            text.includes("error") || text.includes("panic")) {
          div.classList.add("highlight");
        }

        div.textContent = text;
        content.appendChild(div);
      }

      while (content.children.length > MAX_LINES) {
        content.removeChild(content.firstChild);
      }

      applyFilter();
      if (autoScroll) content.scrollTop = content.scrollHeight;
    }

    async function poll() {
      if (paused) return;
      try {
        const { invoke } = window.__TAURI__.core;
        const [logs, maxId] = await invoke("get_logs", { lastId });
        if (logs && logs.length) {
          appendLines(logs.map(([id, text]) => ({ id, text })));
          lastId = maxId;
        }
        statusDot.classList.add("alive");
        statusText.textContent = "Connected";
      } catch (e) {
        statusDot.classList.remove("alive");
        statusText.textContent = "Disconnected: " + e;
      }
    }

    async function pollHealth() {
      try {
        const { invoke } = window.__TAURI__.core;
        const health = await invoke("get_health");
        statusDot.classList.toggle("alive", health.backend_alive);
        statusText.textContent = health.backend_alive ? "Backend UP" : "Backend DOWN";
        uptimeEl.textContent = `Uptime: ${health.uptime_secs}s`;
        if (health.gpu) {
          const vramMb = Math.round(health.gpu.vram_used_bytes / 1048576);
          const totalMb = Math.round(health.gpu.vram_total_bytes / 1048576);
          gpuVram.textContent = `VRAM: ${vramMb}/${totalMb}MB`;
          gpuVram.className = "metric" + (vramMb / totalMb > 0.9 ? " danger" : vramMb / totalMb > 0.7 ? " warn" : "");
          gpuUtil.textContent = `GPU: ${health.gpu.gpu_utilization_pct}%`;
          gpuTemp.textContent = `Temp: ${health.gpu.temperature_celsius}C`;
          gpuTemp.className = "metric" + (health.gpu.temperature_celsius > 85 ? " danger" : health.gpu.temperature_celsius > 70 ? " warn" : "");
        }
      } catch (e) {
        // Silently retry
      }
    }

    setInterval(poll, POLL_MS);
    setInterval(pollHealth, 2000);
    poll();
    pollHealth();
  </script>
</body>
</html>
